name: Build

on:
  push:
    tags: ['v*']          # запускается при git tag v1.0.0 && git push --tags
  workflow_dispatch:      # или вручную из GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare binaries (downloads yt-dlp for macOS)
        run: node scripts/prepare-bins.js

      - name: Build DMG
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Palladium-mac
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare binaries
        run: node scripts/prepare-bins.js

      - name: Build AppImage
        run: npx electron-builder --linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Palladium-linux
          path: dist/*.AppImage
